<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6c63ff">
    <title>ExpoVote Live - Home</title>
    <meta name="description" content="Select your portal for ExpoVote Live" />
    <link rel="stylesheet" href="/css/style.css" />

</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="logo-icon">🗳️</span> ExpoVote Live
        </a>
        <div class="navbar-logo-center">
            <img src="/images/ainnovate-logo.png" alt="A INNOVATE">
        </div>
    </nav>

    <div class="page-wrapper page-wrapper-center">
        <div class="container homepage-container">
            <h1 class="hero-title">Welcome to <span class="gradient-text">ExpoVote</span></h1>
            <p class="hero-subtitle">Select your portal to continue.</p>

            <div class="portal-grid">
                <!-- Voter Portal -->
                <a href="/vote" class="portal-card">
                    <span class="portal-icon">📥</span>
                    <h2 class="portal-title">Voter Portal</h2>
                    <p class="portal-subtitle">Cast your votes for<br>active projects</p>
                </a>

                <!-- Judge Portal -->
                <a href="/judge" class="portal-card">
                    <span class="portal-icon">⚖️</span>
                    <h2 class="portal-title">Judge Portal</h2>
                    <p class="portal-subtitle">Evaluate and score<br>nominated projects</p>
                </a>

                <!-- Admin Portal -->
                <a href="/admin/login" class="portal-card">
                    <span class="portal-icon">🛡️</span>
                    <h2 class="portal-title" style="color:#7c3aed;">Admin Portal</h2>
                    <p class="portal-subtitle">Manage system settings<br>& voting flow</p>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
